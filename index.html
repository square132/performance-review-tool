<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Review & Development Tool</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Import icons from lucide-react CDN
    const Icons = {
      Brain: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></svg>,
      
      FileText: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>,
      
      Users: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      
      TrendingUp: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
      
      Settings: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
      
      Plus: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
      
      Edit2: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>,
      
      Eye: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
      
      EyeOff: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>,
      
      Trash2: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
      
      AlertCircle: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>,
      
      CheckCircle: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      
      Clock: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    };

    const { Brain, FileText, Users, TrendingUp, Settings, Plus, Edit2, Eye, EyeOff, Trash2, AlertCircle, CheckCircle, Clock } = Icons;

    // Main App Component
    function PerformanceReviewTool() {
      const [currentView, setCurrentView] = useState('dashboard');
      const [currentRole, setCurrentRole] = useState('manager');
      const [employees, setEmployees] = useState([]);
      const [selectedEmployee, setSelectedEmployee] = useState(null);
      const [showMetricsToReport, setShowMetricsToReport] = useState(true);

      useEffect(() => {
        const stored = localStorage.getItem('performanceReviewData');
        if (stored) {
          const data = JSON.parse(stored);
          setEmployees(data.employees || []);
          setShowMetricsToReport(data.showMetricsToReport !== false);
        }
      }, []);

      useEffect(() => {
        localStorage.setItem('performanceReviewData', JSON.stringify({
          employees,
          showMetricsToReport
        }));
      }, [employees, showMetricsToReport]);

      const addEmployee = (employeeData) => {
        const newEmployee = {
          id: Date.now().toString(),
          ...employeeData,
          createdAt: new Date().toISOString(),
          oneOnOnes: [],
          staticDocs: [],
          editableDocs: [],
          performanceReviews: [],
          growthReviews: []
        };
        setEmployees([...employees, newEmployee]);
        setSelectedEmployee(newEmployee.id);
      };

      const updateEmployee = (id, updates) => {
        setEmployees(employees.map(emp => 
          emp.id === id ? { ...emp, ...updates } : emp
        ));
      };

      const deleteEmployee = (id) => {
        setEmployees(employees.filter(emp => emp.id !== id));
        if (selectedEmployee === id) {
          setSelectedEmployee(null);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
          <header className="bg-white shadow-sm border-b border-slate-200">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="bg-gradient-to-br from-blue-500 to-blue-600 p-2 rounded-lg">
                    <TrendingUp className="w-6 h-6 text-white" />
                  </div>
                  <div>
                    <h1 className="text-2xl font-bold text-slate-800">Performance & Development Hub</h1>
                    <p className="text-sm text-slate-500">Objective performance tracking and growth management</p>
                  </div>
                </div>
                <RoleSwitcher currentRole={currentRole} setCurrentRole={setCurrentRole} />
              </div>
            </div>
          </header>

          <div className="flex max-w-7xl mx-auto">
            <aside className="w-64 bg-white border-r border-slate-200 min-h-screen p-4">
              <nav className="space-y-2">
                <NavButton icon={<Users />} label="Dashboard" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                <NavButton icon={<FileText />} label="Role Setup" active={currentView === 'roleSetup'} onClick={() => setCurrentView('roleSetup')} />
                <NavButton icon={<Brain />} label="1:1 Meetings" active={currentView === 'oneOnOnes'} onClick={() => setCurrentView('oneOnOnes')} />
                <NavButton icon={<TrendingUp />} label="Reviews" active={currentView === 'reviews'} onClick={() => setCurrentView('reviews')} />
                <NavButton icon={<Settings />} label="Settings" active={currentView === 'settings'} onClick={() => setCurrentView('settings')} />
              </nav>

              {employees.length > 0 && currentView !== 'dashboard' && (
                <div className="mt-8">
                  <label className="block text-xs font-semibold text-slate-600 mb-2">SELECT EMPLOYEE</label>
                  <select value={selectedEmployee || ''} onChange={(e) => setSelectedEmployee(e.target.value)} className="w-full p-2 border border-slate-300 rounded-lg text-sm">
                    <option value="">Select...</option>
                    {employees.map(emp => (
                      <option key={emp.id} value={emp.id}>{emp.name}</option>
                    ))}
                  </select>
                </div>
              )}
            </aside>

            <main className="flex-1 p-6">
              {currentView === 'dashboard' && <Dashboard employees={employees} currentRole={currentRole} onSelectEmployee={setSelectedEmployee} onViewChange={setCurrentView} />}
              {currentView === 'roleSetup' && <RoleSetup employees={employees} selectedEmployee={selectedEmployee} onAddEmployee={addEmployee} onUpdateEmployee={updateEmployee} onDeleteEmployee={deleteEmployee} />}
              {currentView === 'oneOnOnes' && <OneOnOnes employees={employees} selectedEmployee={selectedEmployee} onUpdateEmployee={updateEmployee} currentRole={currentRole} />}
              {currentView === 'reviews' && <Reviews employees={employees} selectedEmployee={selectedEmployee} onUpdateEmployee={updateEmployee} currentRole={currentRole} showMetricsToReport={showMetricsToReport} />}
              {currentView === 'settings' && <SettingsPanel showMetricsToReport={showMetricsToReport} setShowMetricsToReport={setShowMetricsToReport} />}
            </main>
          </div>
        </div>
      );
    }

    function NavButton({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${active ? 'bg-blue-50 text-blue-600 font-medium' : 'text-slate-600 hover:bg-slate-50'}`}>
          {React.cloneElement(icon, { className: 'w-5 h-5' })}
          <span className="text-sm">{label}</span>
        </button>
      );
    }

    function RoleSwitcher({ currentRole, setCurrentRole }) {
      return (
        <div className="flex items-center gap-2 bg-slate-100 rounded-lg p-1">
          {['manager', 'report', 'vp'].map(role => (
            <button key={role} onClick={() => setCurrentRole(role)} className={`px-3 py-1.5 rounded text-sm font-medium transition-all ${currentRole === role ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-600 hover:text-slate-800'}`}>
              {role.charAt(0).toUpperCase() + role.slice(1)}
            </button>
          ))}
        </div>
      );
    }

    function Dashboard({ employees, currentRole, onSelectEmployee, onViewChange }) {
      return (
        <div>
          <div className="mb-6">
            <h2 className="text-2xl font-bold text-slate-800">Team Overview</h2>
            <p className="text-slate-600 mt-1">View as: <span className="font-medium capitalize">{currentRole}</span></p>
          </div>

          {employees.length === 0 ? (
            <div className="bg-white rounded-xl p-12 text-center border border-slate-200">
              <Users className="w-16 h-16 text-slate-300 mx-auto mb-4" />
              <h3 className="text-lg font-semibold text-slate-700 mb-2">No employees added yet</h3>
              <p className="text-slate-500 mb-6">Start by setting up a role and adding team members</p>
              <button onClick={() => onViewChange('roleSetup')} className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                Add First Employee
              </button>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {employees.map(emp => {
                const lastReview = emp.performanceReviews?.[emp.performanceReviews.length - 1];
                return (
                  <div key={emp.id} onClick={() => { onSelectEmployee(emp.id); onViewChange('reviews'); }} className="bg-white rounded-xl p-5 border border-slate-200 hover:border-blue-300 hover:shadow-lg transition-all cursor-pointer">
                    <div className="flex items-start justify-between mb-4">
                      <div>
                        <h3 className="font-semibold text-slate-800 text-lg">{emp.name}</h3>
                        <p className="text-sm text-slate-500">{emp.title}</p>
                      </div>
                      {lastReview && (
                        <div className="flex items-center gap-1 text-sm">
                          {lastReview.overallScore >= 4 ? <CheckCircle className="w-4 h-4 text-green-500" /> : lastReview.overallScore >= 3 ? <Clock className="w-4 h-4 text-yellow-500" /> : <AlertCircle className="w-4 h-4 text-red-500" />}
                        </div>
                      )}
                    </div>
                    <div className="space-y-2">
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-slate-600">Competencies</span>
                        <span className="font-medium text-slate-800">{emp.competencies?.length || 0}</span>
                      </div>
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-slate-600">1:1 Meetings</span>
                        <span className="font-medium text-slate-800">{emp.oneOnOnes?.length || 0}</span>
                      </div>
                      {currentRole !== 'report' && lastReview && (
                        <div className="flex items-center justify-between text-sm pt-2 border-t border-slate-100">
                          <span className="text-slate-600">Last Review</span>
                          <span className="font-medium text-slate-800">{lastReview.overallScore.toFixed(1)}/5</span>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function RoleSetup({ employees, selectedEmployee, onAddEmployee, onUpdateEmployee, onDeleteEmployee }) {
      const [isAddingNew, setIsAddingNew] = useState(false);
      const [newEmployeeData, setNewEmployeeData] = useState({ name: '', title: '', jobDescription: '' });
      const [generatingCompetencies, setGeneratingCompetencies] = useState(false);
      const [editingCompetencies, setEditingCompetencies] = useState(false);

      const employee = employees.find(e => e.id === selectedEmployee);
      
      // Edit competencies state - must be at top level
      const [isEditingComp, setIsEditingComp] = useState(false);
      const [editedCompetencies, setEditedCompetencies] = useState(employee?.competencies || []);

      // Update editedCompetencies when employee changes
      React.useEffect(() => {
        if (employee?.competencies) {
          setEditedCompetencies(employee.competencies);
        }
      }, [employee?.id]);

      const handleGenerateCompetencies = async () => {
        setGeneratingCompetencies(true);
        
        try {
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 1000,
              messages: [{
                role: 'user',
                content: `Based on this job description and title, generate a competency framework with 5-7 key competencies. Each competency should have a name and description.

Job Title: ${newEmployeeData.title}
Job Description: ${newEmployeeData.jobDescription}

Return ONLY a JSON array in this exact format with no preamble or markdown:
[
  {"name": "Competency Name", "description": "What good looks like for this competency"},
  ...
]`
              }]
            })
          });

          const data = await response.json();
          const content = data.content.find(c => c.type === 'text')?.text || '';
          const competencies = JSON.parse(content.trim());
          
          setNewEmployeeData(prev => ({ ...prev, competencies }));
        } catch (error) {
          console.error('Error generating competencies:', error);
          setNewEmployeeData(prev => ({
            ...prev,
            competencies: [
              { name: 'Technical Excellence', description: 'Delivers high-quality work that meets technical standards' },
              { name: 'Communication', description: 'Communicates clearly and effectively with stakeholders' },
              { name: 'Collaboration', description: 'Works effectively with cross-functional teams' },
              { name: 'Problem Solving', description: 'Identifies and resolves complex challenges' },
              { name: 'Initiative', description: 'Takes ownership and drives projects forward' }
            ]
          }));
        }
        
        setGeneratingCompetencies(false);
        setEditingCompetencies(true);
      };

      const handleCreateEmployee = () => {
        onAddEmployee(newEmployeeData);
        setIsAddingNew(false);
        setNewEmployeeData({ name: '', title: '', jobDescription: '' });
      };

      if (isAddingNew || (employees.length === 0 && !selectedEmployee)) {
        return (
          <div className="max-w-3xl">
            <h2 className="text-2xl font-bold text-slate-800 mb-6">Add New Employee</h2>
            
            <div className="bg-white rounded-xl p-6 border border-slate-200 space-y-6">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Employee Name</label>
                <input type="text" value={newEmployeeData.name} onChange={(e) => setNewEmployeeData(prev => ({ ...prev, name: e.target.value }))} className="w-full p-3 border border-slate-300 rounded-lg" placeholder="Enter employee name" />
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Job Title</label>
                <input type="text" value={newEmployeeData.title} onChange={(e) => setNewEmployeeData(prev => ({ ...prev, title: e.target.value }))} className="w-full p-3 border border-slate-300 rounded-lg" placeholder="e.g., Senior Product Manager" />
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Job Description</label>
                <textarea value={newEmployeeData.jobDescription} onChange={(e) => setNewEmployeeData(prev => ({ ...prev, jobDescription: e.target.value }))} className="w-full p-3 border border-slate-300 rounded-lg h-32" placeholder="Paste job description or key responsibilities..." />
              </div>

              {!newEmployeeData.competencies && (
                <button onClick={handleGenerateCompetencies} disabled={!newEmployeeData.jobDescription || generatingCompetencies} className="w-full bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 transition-colors disabled:bg-slate-300 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                  <Brain className="w-5 h-5" />
                  {generatingCompetencies ? 'Generating Competencies...' : 'Generate Competencies with AI'}
                </button>
              )}

              {newEmployeeData.competencies && (
                <div>
                  <div className="flex items-center justify-between mb-3">
                    <label className="block text-sm font-medium text-slate-700">Competencies</label>
                    <button onClick={() => setEditingCompetencies(!editingCompetencies)} className="text-sm text-blue-600 hover:text-blue-700 flex items-center gap-1">
                      <Edit2 className="w-4 h-4" />
                      {editingCompetencies ? 'Done Editing' : 'Edit'}
                    </button>
                  </div>
                  
                  <div className="space-y-3">
                    {newEmployeeData.competencies.map((comp, idx) => (
                      <div key={idx} className="bg-slate-50 p-4 rounded-lg">
                        {editingCompetencies ? (
                          <>
                            <input type="text" value={comp.name} onChange={(e) => {
                              const updated = [...newEmployeeData.competencies];
                              updated[idx].name = e.target.value;
                              setNewEmployeeData(prev => ({ ...prev, competencies: updated }));
                            }} className="w-full p-2 border border-slate-300 rounded mb-2 font-medium" />
                            <textarea value={comp.description} onChange={(e) => {
                              const updated = [...newEmployeeData.competencies];
                              updated[idx].description = e.target.value;
                              setNewEmployeeData(prev => ({ ...prev, competencies: updated }));
                            }} className="w-full p-2 border border-slate-300 rounded text-sm" rows="2" />
                          </>
                        ) : (
                          <>
                            <h4 className="font-medium text-slate-800">{comp.name}</h4>
                            <p className="text-sm text-slate-600 mt-1">{comp.description}</p>
                          </>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="flex gap-3 pt-4">
                <button onClick={handleCreateEmployee} disabled={!newEmployeeData.name || !newEmployeeData.title || !newEmployeeData.competencies} className="flex-1 bg-green-600 text-white px-4 py-3 rounded-lg hover:bg-green-700 transition-colors disabled:bg-slate-300 disabled:cursor-not-allowed">
                  Create Employee Profile
                </button>
                {employees.length > 0 && (
                  <button onClick={() => setIsAddingNew(false)} className="px-4 py-3 border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">
                    Cancel
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      }

      if (!employee && employees.length > 0) {
        return (
          <div className="text-center py-12">
            <FileText className="w-16 h-16 text-slate-300 mx-auto mb-4" />
            <h3 className="text-lg font-semibold text-slate-700 mb-2">Select an employee to view their role</h3>
            <p className="text-slate-500 mb-6">Or add a new employee to get started</p>
            <button onClick={() => setIsAddingNew(true)} className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
              Add New Employee
            </button>
          </div>
        );
      }

      const handleSaveCompetencies = () => {
        onUpdateEmployee(employee.id, { competencies: editedCompetencies });
        setIsEditingComp(false);
      };

      const handleAddCompetency = () => {
        setEditedCompetencies([...editedCompetencies, { name: 'New Competency', description: 'Description' }]);
      };

      const handleRemoveCompetency = (idx) => {

    function OneOnOnes({ employees, selectedEmployee, onUpdateEmployee, currentRole }) {

      const [showTemplate, setShowTemplate] = useState(false);
      const [editingMeetingId, setEditingMeetingId] = useState(null);
      const [editedMeeting, setEditedMeeting] = useState(null);
      const employee = employees.find(e => e.id === selectedEmployee);

      const REGULAR_TEMPLATE = `WINS, AVAILABILITY & ENERGY CHECK (5 mins)
- 

TOP 2 PRIORITIES (10 mins)
- Priority 1: 
  • What's working:
  • What's stuck:
  • What decision or unblocking needed:

- Priority 2:
  • What's working:
  • What's stuck:
  • What decision or unblocking needed:

RISKS & HELP (5-10 mins)
- Early warnings:
- Backup/support needed:
- Help/delegation vs. autonomy:
- Escalation issues (HR, operational/talent risk, PTO):

MICRO FEEDBACK (2 mins)
- `;

      const QUARTERLY_TEMPLATE = `REFLECTION (10 mins)
- New learnings:
- What stretched you:

COMPETENCIES & IMPACT (15 mins)
- What skills are you building:
- What gaps do you want to address or need perspective on:
- Where do you want more exposure? What does exposure look like for you:

ROLE EVOLUTION & SCOPE; CAREER PATHING (10-15 mins)
- What do you want more/less of? Why:
- Are we aligned on where you are heading:
- Longer term aspirations:

MANAGEMENT FEEDBACK (10-15 mins)
- Targeted feedback:
- Sponsorship opportunities:
- Course correction if needed:
`;

      const handleAddMeeting = () => {
        if (!newMeeting.date || !newMeeting.agenda) return;
        const meeting = { 
          id: Date.now().toString(), 
          ...newMeeting, 
          createdAt: new Date().toISOString(),
          editHistory: []
        };
        onUpdateEmployee(selectedEmployee, { oneOnOnes: [...(employee.oneOnOnes || []), meeting] });
        setNewMeeting({ date: '', agenda: '', notes: '', addedBy: currentRole, meetingType: 'regular' });
      };

      const handleUseTemplate = () => {
        const template = newMeeting.meetingType === 'regular' ? REGULAR_TEMPLATE : QUARTERLY_TEMPLATE;
        const agendaText = newMeeting.meetingType === 'regular' ? 'Regular 1:1' : 'Quarterly Check-in';
        setNewMeeting(prev => ({ ...prev, agenda: agendaText, notes: template }));
        setShowTemplate(false);
      };

      const handleEditMeeting = (meeting) => {
        setEditingMeetingId(meeting.id);
        setEditedMeeting({ ...meeting });
      };

      const handleSaveEdit = () => {
        const editRecord = {
          editedBy: currentRole,
          editedAt: new Date().toISOString(),
          previousNotes: employee.oneOnOnes.find(m => m.id === editingMeetingId).notes
        };
        
        const updatedMeeting = {
          ...editedMeeting,
          editHistory: [...(editedMeeting.editHistory || []), editRecord]
        };

        const updatedMeetings = employee.oneOnOnes.map(m => 
          m.id === editingMeetingId ? updatedMeeting : m
        );

        onUpdateEmployee(selectedEmployee, { oneOnOnes: updatedMeetings });
        setEditingMeetingId(null);
        setEditedMeeting(null);
      };

      const handleCancelEdit = () => {
        setEditingMeetingId(null);
        setEditedMeeting(null);
      };

      if (!employee) {
        return (
          <div className="text-center py-12">
            <Brain className="w-16 h-16 text-slate-300 mx-auto mb-4" />
            <h3 className="text-lg font-semibold text-slate-700 mb-2">Select an employee</h3>
            <p className="text-slate-500">Choose an employee to manage 1:1 meetings</p>
          </div>
        );
      }

      return (
        <div className="max-w-4xl">
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-2xl font-bold text-slate-800">1:1 Meetings</h2>
              <p className="text-slate-600">{employee.name}</p>
            </div>
          </div>

          <div className="bg-white rounded-xl p-6 border border-slate-200 mb-6">
            <h3 className="font-semibold text-slate-800 mb-4">Add New Meeting</h3>
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-2">Date</label>
                  <input type="date" value={newMeeting.date} onChange={(e) => setNewMeeting(prev => ({ ...prev, date: e.target.value }))} className="w-full p-2 border border-slate-300 rounded-lg" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-2">Added By</label>
                  <input type="text" value={currentRole} disabled className="w-full p-2 border border-slate-300 rounded-lg bg-slate-50 capitalize" />
                </div>
              </div>
              
              <div className="flex gap-2 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                <div className="flex-1">
                  <p className="text-sm font-medium text-blue-900 mb-2">Use a template:</p>
                  <div className="flex gap-2">
                    <button 
                      onClick={() => { setNewMeeting(prev => ({ ...prev, meetingType: 'regular' })); handleUseTemplate(); }}
                      className="flex-1 bg-white border border-blue-300 text-blue-700 px-3 py-2 rounded text-sm hover:bg-blue-50 transition-colors"
                    >
                      📋 Regular 1:1
                    </button>
                    <button 
                      onClick={() => { setNewMeeting(prev => ({ ...prev, meetingType: 'quarterly' })); handleUseTemplate(); }}
                      className="flex-1 bg-white border border-blue-300 text-blue-700 px-3 py-2 rounded text-sm hover:bg-blue-50 transition-colors"
                    >
                      📊 Quarterly Check-in
                    </button>
                  </div>
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Agenda</label>
                <input type="text" value={newMeeting.agenda} onChange={(e) => setNewMeeting(prev => ({ ...prev, agenda: e.target.value }))} className="w-full p-2 border border-slate-300 rounded-lg" placeholder="What topics to discuss?" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Notes</label>
                <textarea value={newMeeting.notes} onChange={(e) => setNewMeeting(prev => ({ ...prev, notes: e.target.value }))} className="w-full p-2 border border-slate-300 rounded-lg h-64 font-mono text-sm" placeholder="Meeting notes, action items, discussions..." />
                <p className="text-xs text-slate-500 mt-1">💡 Tip: Click a template button above to load structured questions</p>
              </div>
              <button onClick={handleAddMeeting} className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                Add Meeting
              </button>
            </div>
          </div>

          <div className="bg-white rounded-xl p-6 border border-slate-200">
            <h3 className="font-semibold text-slate-800 mb-4">Meeting History</h3>
            {employee.oneOnOnes?.length === 0 ? (
              <p className="text-slate-500 text-sm text-center py-8">No meetings recorded yet</p>
            ) : (
              <div className="space-y-4">
                {[...(employee.oneOnOnes || [])].reverse().map((meeting) => (
                  <div key={meeting.id} className="border border-slate-200 rounded-lg p-4">
                    {editingMeetingId === meeting.id ? (
                      // Edit mode
                      <div className="space-y-3">
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Agenda</label>
                          <input 
                            type="text" 
                            value={editedMeeting.agenda}
                            onChange={(e) => setEditedMeeting({...editedMeeting, agenda: e.target.value})}
                            className="w-full p-2 border border-slate-300 rounded"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Notes</label>
                          <textarea 
                            value={editedMeeting.notes}
                            onChange={(e) => setEditedMeeting({...editedMeeting, notes: e.target.value})}
                            className="w-full p-2 border border-slate-300 rounded font-mono text-sm h-48"
                          />
                        </div>
                        <div className="flex gap-2">
                          <button onClick={handleSaveEdit} className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
                            Save Changes
                          </button>
                          <button onClick={handleCancelEdit} className="border border-slate-300 px-4 py-2 rounded hover:bg-slate-50 text-sm">
                            Cancel
                          </button>
                        </div>
                      </div>
                    ) : (
                      // View mode
                      <>
                        <div className="flex items-center justify-between mb-2">
                          <div className="flex items-center gap-3">
                            <span className="font-medium text-slate-800">{meeting.date}</span>
                            <span className="text-xs bg-slate-100 px-2 py-1 rounded capitalize">{meeting.addedBy}</span>
                          </div>
                          <button 
                            onClick={() => handleEditMeeting(meeting)}
                            className="text-blue-600 hover:text-blue-700 flex items-center gap-1 text-sm"
                          >
                            <Edit2 className="w-4 h-4" />
                            Edit
                          </button>
                        </div>
                        <h4 className="font-medium text-slate-700 mb-2">{meeting.agenda}</h4>
                        <p className="text-sm text-slate-600 whitespace-pre-wrap">{meeting.notes}</p>
                        
                        {meeting.editHistory && meeting.editHistory.length > 0 && (
                          <div className="mt-3 pt-3 border-t border-slate-200">
                            <p className="text-xs text-slate-500 italic">
                              Last edited by {meeting.editHistory[meeting.editHistory.length - 1].editedBy} on{' '}
                              {new Date(meeting.editHistory[meeting.editHistory.length - 1].editedAt).toLocaleString()}
                            </p>
                            {meeting.editHistory.length > 1 && (
                              <p className="text-xs text-slate-400 mt-1">
                                ({meeting.editHistory.length} edit{meeting.editHistory.length > 1 ? 's' : ''} total)
                              </p>

                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function Reviews({ employees, selectedEmployee, onUpdateEmployee, currentRole, showMetricsToReport }) {
      const [reviewType, setReviewType] = useState('performance');
      const [generatingReview, setGeneratingReview] = useState(false);
      const [draftReview, setDraftReview] = useState(null);
      const [showNoteForm, setShowNoteForm] = useState(false);
      const [newNote, setNewNote] = useState({ content: '', addedBy: currentRole });

      const employee = employees.find(e => e.id === selectedEmployee);

      const handleAddNote = () => {
        if (!newNote.content.trim()) return;
        
        const note = {
          id: Date.now().toString(),
          content: newNote.content,
          addedBy: currentRole,
          createdAt: new Date().toISOString()
        };

        onUpdateEmployee(selectedEmployee, {
          reviewNotes: [...(employee.reviewNotes || []), note]
        });

        setNewNote({ content: '', addedBy: currentRole });
        setShowNoteForm(false);
      };

      const handleGenerateReview = async () => {
        setGeneratingReview(true);
        
        // Gather all 1:1 notes for AI analysis
        const meetingNotes = employee.oneOnOnes?.map(m => 
          `Date: ${m.date}\nAgenda: ${m.agenda}\nNotes: ${m.notes}`
        ).join('\n\n---\n\n') || '';

        const competenciesText = employee.competencies?.map(c => 
          `${c.name}: ${c.description}`
        ).join('\n');

        console.log('Generating review with', employee.oneOnOnes?.length || 0, 'meetings');
        console.log('Meeting notes length:', meetingNotes.length);

        // Try to get AI-generated examples if there are meeting notes
        let aiExamples = null;
        if (meetingNotes && meetingNotes.length > 50) {
          console.log('Attempting AI analysis...');
          try {
            const prompt = reviewType === 'performance'
              ? `Analyze these 1:1 meeting notes and extract specific examples for a performance review.

Employee: ${employee.name}
Title: ${employee.title}

Competencies:
${competenciesText}

Meeting Notes:
${meetingNotes}

Extract 2-3 specific examples for each category. Return ONLY JSON with no preamble:
{
  "outcomes": ["example 1", "example 2"],
  "crossFunctional": ["example 1", "example 2"],
  "values": ["example 1", "example 2"],
  "suggestedSummary": "One paragraph summary of overall performance"
}`
              : `Analyze these 1:1 meeting notes and extract examples for a development assessment.

Employee: ${employee.name}
Title: ${employee.title}

Competencies:
${competenciesText}

Meeting Notes:
${meetingNotes}

Extract specific examples and provide assessment. Return ONLY JSON with no preamble:
{
  "operationalToStrategic": {"examples": ["ex1", "ex2"], "assessment": "brief assessment"},
  "complexityManaged": {"examples": ["ex1", "ex2"], "assessment": "brief assessment"},
  "influenceRadius": {"examples": ["ex1", "ex2"], "assessment": "brief assessment"},
  "autonomy": {"examples": ["ex1", "ex2"], "assessment": "brief assessment"},
  "skillVelocity": {"examples": ["ex1", "ex2"], "assessment": "brief assessment"},
  "suggestedSummary": "Overall development summary",
  "suggestedRecommendations": ["rec 1", "rec 2", "rec 3"]
}`;

            // This will fail with CORS in local mode, but work on deployed version
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 2000,
                messages: [{ role: 'user', content: prompt }]
              })
            });

            const data = await response.json();
            const content = data.content.find(c => c.type === 'text')?.text || '';
            aiExamples = JSON.parse(content.trim());
            console.log('AI examples generated successfully!', aiExamples);
          } catch (error) {
            console.log('AI examples not available (expected in local mode):', error.message);
            // Continue without AI examples
          }
        } else {
          console.log('Not enough meeting notes for AI analysis (need >50 chars, have', meetingNotes.length, ')');
        }

        // Create review with AI examples if available, otherwise use manual template
        const manualReview = reviewType === 'performance' 
          ? {
              outcomes: { 
                score: 3.5, 
                summary: aiExamples?.outcomes 
                  ? `Examples: ${aiExamples.outcomes.join('; ')}. [Edit score and summary]`
                  : 'Edit this summary based on outcomes achieved',
                examples: aiExamples?.outcomes || []
              },
              crossFunctional: { 
                score: 3.5, 
                summary: aiExamples?.crossFunctional
                  ? `Examples: ${aiExamples.crossFunctional.join('; ')}. [Edit score and summary]`
                  : 'Edit this summary based on cross-functional impact',
                examples: aiExamples?.crossFunctional || []
              },
              values: { 
                score: 3.5, 
                summary: aiExamples?.values
                  ? `Examples: ${aiExamples.values.join('; ')}. [Edit score and summary]`
                  : 'Edit this summary based on values/leadership',
                examples: aiExamples?.values || []
              },
              overallScore: 3.5,
              overallSummary: aiExamples?.suggestedSummary || 'Edit this overall summary. Consider the employee\'s achievements, collaboration, and cultural fit.',
              date: new Date().toISOString(),
              type: 'performance'
            }
          : {
              operationalToStrategic: { 
                level: 'Emerging Strategic', 
                summary: aiExamples?.operationalToStrategic?.assessment || 'Edit this summary',
                examples: aiExamples?.operationalToStrategic?.examples || []
              },
              complexityManaged: { 
                level: 'Medium Complexity', 
                summary: aiExamples?.complexityManaged?.assessment || 'Edit this summary',
                examples: aiExamples?.complexityManaged?.examples || []
              },
              influenceRadius: { 
                level: 'Team Level', 
                summary: aiExamples?.influenceRadius?.assessment || 'Edit this summary',
                examples: aiExamples?.influenceRadius?.examples || []
              },
              autonomy: { 
                level: 'Guided Autonomy', 
                summary: aiExamples?.autonomy?.assessment || 'Edit this summary',
                examples: aiExamples?.autonomy?.examples || []
              },
              skillVelocity: { 
                level: 'Steady Growth', 
                summary: aiExamples?.skillVelocity?.assessment || 'Edit this summary',
                examples: aiExamples?.skillVelocity?.examples || []
              },
              overallSummary: aiExamples?.suggestedSummary || 'Edit this overall summary based on the employee\'s growth trajectory.',
              developmentRecommendations: aiExamples?.suggestedRecommendations || [
                'Edit: Development recommendation 1',
                'Edit: Development recommendation 2', 
                'Edit: Development recommendation 3'
              ],
              date: new Date().toISOString(),
              type: 'growth'
            };
        
        console.log('Creating review template. AI examples:', aiExamples ? 'YES' : 'NO');
        setDraftReview(manualReview);
        setGeneratingReview(false);
      };

      const handleSaveReview = () => {
        const reviewList = reviewType === 'performance' 
          ? employee.performanceReviews || []
          : employee.growthReviews || [];

        const updateKey = reviewType === 'performance' ? 'performanceReviews' : 'growthReviews';
        
        onUpdateEmployee(selectedEmployee, {
          [updateKey]: [...reviewList, draftReview]
        });

        setDraftReview(null);
      };

      if (!employee) {
        return (
          <div className="text-center py-12">
            <TrendingUp className="w-16 h-16 text-slate-300 mx-auto mb-4" />
            <h3 className="text-lg font-semibold text-slate-700 mb-2">Select an employee</h3>
            <p className="text-slate-500">Choose an employee to view or generate reviews</p>
          </div>
        );

      if (currentRole === 'vp') {
        return (
          <div className="max-w-4xl">
            <h2 className="text-2xl font-bold text-slate-800 mb-6">Reviews - {employee.name}</h2>
            
            <div className="bg-white rounded-xl p-6 border border-slate-200">
              <div className="flex gap-4 mb-6">
                <button
                  onClick={() => setReviewType('performance')}
                  className={`flex-1 py-3 rounded-lg font-medium transition-colors ${
                    reviewType === 'performance'
                      ? 'bg-blue-600 text-white'
                      : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                  }`}
                >
                  Performance Reviews
                </button>
                <button
                  onClick={() => setReviewType('growth')}
                  className={`flex-1 py-3 rounded-lg font-medium transition-colors ${
                    reviewType === 'growth'
                      ? 'bg-blue-600 text-white'
                      : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                  }`}
                >
                  Development Assessment
                </button>
              </div>

              <ReviewHistory employee={employee} reviewType={reviewType} />
            </div>
          </div>
        );
      }

      if (currentRole === 'report' && !showMetricsToReport) {
        return (
          <div className="max-w-4xl">
            <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-6 text-center">
              <Eye className="w-12 h-12 text-yellow-600 mx-auto mb-4" />
              <h3 className="text-lg font-semibold text-slate-800 mb-2">Reviews Not Visible</h3>
              <p className="text-slate-600">Your manager has not enabled review visibility for reports. Contact your manager if you'd like to discuss your reviews.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-4xl">
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-2xl font-bold text-slate-800">Reviews</h2>
              <p className="text-slate-600">{employee.name}</p>
            </div>
            {currentRole === 'manager' && (
              <div className="flex gap-2">
                <button
                  onClick={handleGenerateReview}
                  disabled={generatingReview || !employee.oneOnOnes?.length}
                  className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center gap-2 disabled:bg-slate-300 disabled:cursor-not-allowed"
                >
                  <Plus className="w-4 h-4" />
                  Create Review Template
                </button>
                <button
                  onClick={() => setShowNoteForm(!showNoteForm)}
                  className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2"
                >
                  <FileText className="w-4 h-4" />
                  {showNoteForm ? 'Cancel Note' : 'Create Note'}
                </button>
              </div>
            )}
          </div>

          <div className="bg-white rounded-xl p-6 border border-slate-200 mb-6">
            <div className="flex gap-4 mb-6">
              <button
                onClick={() => setReviewType('performance')}
                className={`flex-1 py-3 rounded-lg font-medium transition-colors ${
                  reviewType === 'performance'
                    ? 'bg-blue-600 text-white'
                    : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                }`}
              >
                Performance Reviews
                <div className="text-xs mt-1 opacity-80">Quarterly - Compensation evidence</div>
              </button>
              <button
                onClick={() => setReviewType('growth')}
                className={`flex-1 py-3 rounded-lg font-medium transition-colors ${
                  reviewType === 'growth'
                    ? 'bg-blue-600 text-white'
                    : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                }`}
              >
                Development Assessment
                <div className="text-xs mt-1 opacity-80">Semi-annual - Career pathing</div>
              </button>
            </div>

            {!employee.oneOnOnes?.length && (
              <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                <p className="text-sm text-blue-800">
                  💡 Add some 1:1 meetings first. Review templates will reference your meeting notes as context.
                </p>
              </div>
            )}

            {employee.oneOnOnes?.length > 0 && employee.oneOnOnes.length < 3 && (
              <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                <p className="text-sm text-yellow-800">
                  💡 You have {employee.oneOnOnes.length} meeting(s). Add 2-3 more meetings with detailed notes for better AI-generated examples.
                </p>
              </div>
            )}

            <div className="bg-slate-100 border border-slate-300 rounded-lg p-4 mb-6">
              <p className="text-xs text-slate-700">
                <strong>Note:</strong> AI-assisted example generation requires a secure backend server to protect API credentials. 
                The current browser-only version creates editable templates with placeholder text. 
                AI features will be available in Phase 3 after adding Firebase authentication and cloud functions.
              </p>
            </div>

            {showNoteForm && (
              <div className="bg-white border-2 border-blue-300 rounded-lg p-6 mb-6">
                <h3 className="font-semibold text-slate-800 mb-3">Create Note</h3>
                <p className="text-sm text-slate-600 mb-4">
                  Add standalone notes about performance observations, development conversations, or other review-related topics.
                </p>
                <textarea
                  value={newNote.content}
                  onChange={(e) => setNewNote({...newNote, content: e.target.value})}
                  className="w-full p-3 border border-slate-300 rounded-lg h-32 mb-3"
                  placeholder="Enter your note here..."
                />
                <div className="flex gap-2">
                  <button
                    onClick={handleAddNote}
                    className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors"
                  >
                    Save Note
                  </button>
                  <button
                    onClick={() => {setShowNoteForm(false); setNewNote({content: '', addedBy: currentRole});}}
                    className="border border-slate-300 px-4 py-2 rounded-lg hover:bg-slate-50 transition-colors"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            )}

            {employee.reviewNotes && employee.reviewNotes.length > 0 && (
              <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                <h3 className="font-semibold text-slate-800 mb-3">Review Notes</h3>
                <div className="space-y-3">
                  {[...(employee.reviewNotes || [])].reverse().map((note) => (
                    <div key={note.id} className="bg-white p-3 rounded border border-slate-200">
                      <div className="flex items-center justify-between mb-2">
                        <span className="text-xs text-slate-500">
                          {new Date(note.createdAt).toLocaleDateString()} - Added by {note.addedBy}
                        </span>
                      </div>
                      <p className="text-sm text-slate-700 whitespace-pre-wrap">{note.content}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {draftReview && (
              <div className="bg-gradient-to-br from-green-50 to-blue-50 border border-green-200 rounded-lg p-6 mb-6">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="font-semibold text-slate-800 flex items-center gap-2">
                    <Edit2 className="w-5 h-5 text-green-600" />
                    {reviewType === 'performance' ? 'Performance Review' : 'Development Assessment'} - Edit & Customize
                  </h3>
                  <div className="flex gap-2">
                    <button
                      onClick={handleSaveReview}
                      className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition-colors text-sm"
                    >
                      Save Review
                    </button>
                    <button
                      onClick={() => setDraftReview(null)}
                      className="bg-white border border-slate-300 px-4 py-2 rounded-lg hover:bg-slate-50 transition-colors text-sm"
                    >
                      Discard
                    </button>
                  </div>
                </div>

                {reviewType === 'performance' ? (
                  <PerformanceReviewCard review={draftReview} isDraft={true} onUpdate={setDraftReview} />
                ) : (
                  <GrowthReviewCard review={draftReview} isDraft={true} onUpdate={setDraftReview} />
                )}
              </div>
            )}

            <ReviewHistory employee={employee} reviewType={reviewType} />
          </div>
        </div>
      );
    }

    function ReviewHistory({ employee, reviewType }) {
      const reviews = reviewType === 'performance' 
        ? employee.performanceReviews || []
        : employee.growthReviews || [];

      if (reviews.length === 0) {
        return (
          <div className="text-center py-12">
            <FileText className="w-12 h-12 text-slate-300 mx-auto mb-3" />
            <p className="text-slate-500">No {reviewType} reviews yet</p>
          </div>
        );
      }

      return (
        <div className="space-y-4">
          <h3 className="font-semibold text-slate-800">Review History</h3>
          {[...reviews].reverse().map((review, idx) => (
            <div key={idx}>
              {reviewType === 'performance' ? (
                <PerformanceReviewCard review={review} />
              ) : (
                <GrowthReviewCard review={review} />
              )}
            </div>
          ))}
        </div>
      );
    }

    function PerformanceReviewCard({ review, isDraft, onUpdate }) {
      const handleScoreChange = (category, value) => {
        if (isDraft && onUpdate) {
          const newScore = parseFloat(value) || 0;
          const updated = { ...review };
          updated[category].score = newScore;
          // Recalculate overall score
          updated.overallScore = (updated.outcomes.score * 0.5 + updated.crossFunctional.score * 0.3 + updated.values.score * 0.2);
          onUpdate(updated);
        }
      };

      const handleSummaryChange = (category, value) => {
        if (isDraft && onUpdate) {
          const updated = { ...review };
          if (category === 'overall') {
            updated.overallSummary = value;
          } else {
            updated[category].summary = value;
          }
          onUpdate(updated);
        }
      };

      return (
        <div className={`border rounded-lg p-4 ${isDraft ? '' : 'border-slate-200 bg-white'}`}>
          <div className="flex items-center justify-between mb-4">
            <div>
              <span className="text-sm text-slate-600">
                {new Date(review.date).toLocaleDateString()}
              </span>
            </div>
            <div className="text-2xl font-bold text-blue-600">
              {review.overallScore.toFixed(1)}/5
            </div>
          </div>

          <div className="space-y-3 mb-4">
            <EditableScoreItem 
              label="Outcomes (50%)" 
              score={review.outcomes.score} 
              summary={review.outcomes.summary}
              isDraft={isDraft}
              onScoreChange={(v) => handleScoreChange('outcomes', v)}
              onSummaryChange={(v) => handleSummaryChange('outcomes', v)}
            />
            <EditableScoreItem 
              label="Cross-Functional Impact (30%)" 
              score={review.crossFunctional.score} 
              summary={review.crossFunctional.summary}
              isDraft={isDraft}
              onScoreChange={(v) => handleScoreChange('crossFunctional', v)}
              onSummaryChange={(v) => handleSummaryChange('crossFunctional', v)}
            />
            <EditableScoreItem 
              label="Values/Leadership (20%)" 
              score={review.values.score} 
              summary={review.values.summary}
              isDraft={isDraft}
              onScoreChange={(v) => handleScoreChange('values', v)}
              onSummaryChange={(v) => handleSummaryChange('values', v)}
            />
          </div>

          <div className="pt-4 border-t border-slate-200">
            <h4 className="text-sm font-semibold text-slate-700 mb-2">Overall Summary</h4>
            {isDraft ? (
              <textarea 
                value={review.overallSummary}
                onChange={(e) => handleSummaryChange('overall', e.target.value)}
                className="w-full p-2 border border-slate-300 rounded text-sm"
                rows="3"
              />
            ) : (
              <p className="text-sm text-slate-600 leading-relaxed">{review.overallSummary}</p>
            )}
          </div>
        </div>
      );
    }

    function EditableScoreItem({ label, score, summary, isDraft, onScoreChange, onSummaryChange }) {
      return (
        <div>
          <div className="flex items-center justify-between mb-1">
            <span className="text-sm font-medium text-slate-700">{label}</span>
            {isDraft ? (
              <input 
                type="number" 
                min="0" 
                max="5" 
                step="0.1"
                value={score}
                onChange={(e) => onScoreChange(e.target.value)}
                className="w-16 text-sm font-semibold text-slate-800 border border-slate-300 rounded px-2 py-1"
              />
            ) : (
              <span className="text-sm font-semibold text-slate-800">{score.toFixed(1)}/5</span>
            )}
          </div>
          <div className="w-full bg-slate-200 rounded-full h-2 mb-1">
            <div 
              className="bg-blue-600 h-2 rounded-full transition-all" 
              style={{ width: `${(score / 5) * 100}%` }}
            />
          </div>
          {isDraft ? (
            <input 
              type="text"
              value={summary}
              onChange={(e) => onSummaryChange(e.target.value)}
              className="w-full text-xs p-1 border border-slate-300 rounded"
            />
          ) : (
            <p className="text-xs text-slate-600">{summary}</p>
          )}
        </div>
      );
    }

    function GrowthReviewCard({ review, isDraft, onUpdate }) {
      const handleFieldChange = (field, subfield, value) => {
        if (isDraft && onUpdate) {
          const updated = { ...review };
          if (field === 'overall') {
            updated.overallSummary = value;
          } else if (field === 'recommendations') {
            updated.developmentRecommendations = value.split('\n').filter(r => r.trim());
          } else {
            updated[field][subfield] = value;
          }
          onUpdate(updated);
        }
      };

      return (
        <div className={`border rounded-lg p-4 ${isDraft ? '' : 'border-slate-200 bg-white'}`}>
          <div className="mb-4">
            <span className="text-sm text-slate-600">
              {new Date(review.date).toLocaleDateString()}
            </span>
          </div>

          <div className="space-y-3 mb-4">
            <EditableGrowthItem 
              label="Operational → Strategic" 
              level={review.operationalToStrategic.level} 
              summary={review.operationalToStrategic.summary}
              isDraft={isDraft}
              onLevelChange={(v) => handleFieldChange('operationalToStrategic', 'level', v)}
              onSummaryChange={(v) => handleFieldChange('operationalToStrategic', 'summary', v)}
            />
            <EditableGrowthItem 
              label="Complexity Managed" 
              level={review.complexityManaged.level} 
              summary={review.complexityManaged.summary}
              isDraft={isDraft}
              onLevelChange={(v) => handleFieldChange('complexityManaged', 'level', v)}
              onSummaryChange={(v) => handleFieldChange('complexityManaged', 'summary', v)}
            />
            <EditableGrowthItem 
              label="Influence Radius" 
              level={review.influenceRadius.level} 
              summary={review.influenceRadius.summary}
              isDraft={isDraft}
              onLevelChange={(v) => handleFieldChange('influenceRadius', 'level', v)}
              onSummaryChange={(v) => handleFieldChange('influenceRadius', 'summary', v)}
            />
            <EditableGrowthItem 
              label="Autonomy" 
              level={review.autonomy.level} 
              summary={review.autonomy.summary}
              isDraft={isDraft}
              onLevelChange={(v) => handleFieldChange('autonomy', 'level', v)}
              onSummaryChange={(v) => handleFieldChange('autonomy', 'summary', v)}
            />
            <EditableGrowthItem 
              label="Skill Velocity" 
              level={review.skillVelocity.level} 
              summary={review.skillVelocity.summary}
              isDraft={isDraft}
              onLevelChange={(v) => handleFieldChange('skillVelocity', 'level', v)}
              onSummaryChange={(v) => handleFieldChange('skillVelocity', 'summary', v)}
            />
          </div>

          <div className="pt-4 border-t border-slate-200 mb-4">
            <h4 className="text-sm font-semibold text-slate-700 mb-2">Overall Summary</h4>
            {isDraft ? (
              <textarea 
                value={review.overallSummary}
                onChange={(e) => handleFieldChange('overall', null, e.target.value)}
                className="w-full p-2 border border-slate-300 rounded text-sm"
                rows="3"
              />
            ) : (
              <p className="text-sm text-slate-600 leading-relaxed">{review.overallSummary}</p>
            )}
          </div>

          <div className="pt-4 border-t border-slate-200">
            <h4 className="text-sm font-semibold text-slate-700 mb-2">Development Recommendations</h4>
            {isDraft ? (
              <textarea 
                value={review.developmentRecommendations?.join('\n')}
                onChange={(e) => handleFieldChange('recommendations', null, e.target.value)}
                className="w-full p-2 border border-slate-300 rounded text-sm"
                rows="3"
                placeholder="One recommendation per line"
              />
            ) : (
              <ul className="space-y-1">
                {review.developmentRecommendations?.map((rec, idx) => (
                  <li key={idx} className="text-sm text-slate-600 flex items-start gap-2">
                    <span className="text-blue-600 mt-1">•</span>
                    <span>{rec}</span>
                  </li>
                ))}
              </ul>
            )}
          </div>
        </div>
      );
    }

    function EditableGrowthItem({ label, level, summary, isDraft, onLevelChange, onSummaryChange }) {
      return (
        <div>
          <div className="flex items-center justify-between mb-1">
            <span className="text-sm font-medium text-slate-700">{label}</span>
            {isDraft ? (
              <input 
                type="text"
                value={level}
                onChange={(e) => onLevelChange(e.target.value)}
                className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded border border-blue-300"
              />
            ) : (
              <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">{level}</span>
            )}
          </div>
          {isDraft ? (
            <input 
              type="text"
              value={summary}
              onChange={(e) => onSummaryChange(e.target.value)}
              className="w-full text-xs p-1 border border-slate-300 rounded"
            />
          ) : (
            <p className="text-xs text-slate-600">{summary}</p>
          )}
        </div>
      );
    }

    function ScoreItem({ label, score, summary }) {
      return (
        <div>
          <div className="flex items-center justify-between mb-1">
            <span className="text-sm font-medium text-slate-700">{label}</span>
            <span className="text-sm font-semibold text-slate-800">{score.toFixed(1)}/5</span>
          </div>
          <div className="w-full bg-slate-200 rounded-full h-2 mb-1">
            <div 
              className="bg-blue-600 h-2 rounded-full transition-all" 
              style={{ width: `${(score / 5) * 100}%` }}
            />
          </div>
          <p className="text-xs text-slate-600">{summary}</p>
        </div>
      );
    }

    function GrowthItem({ label, level, summary }) {
      return (
        <div>
          <div className="flex items-center justify-between mb-1">
            <span className="text-sm font-medium text-slate-700">{label}</span>
            <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">{level}</span>
          </div>
          <p className="text-xs text-slate-600">{summary}</p>
        </div>
      );
    }

    function SettingsPanel({ showMetricsToReport, setShowMetricsToReport }) {
      const handleExportData = () => {
        const data = localStorage.getItem('performanceReviewData');
        if (!data) {
          alert('No data to export');
          return;
        }
        
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `performance-review-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const handleImportData = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const importedData = JSON.parse(e.target.result);
            if (confirm('This will replace all current data. Are you sure?')) {
              localStorage.setItem('performanceReviewData', JSON.stringify(importedData));
              alert('Data imported successfully! Refreshing page...');
              window.location.reload();
            }
          } catch (error) {
            alert('Error importing data. Please check the file format.');
            console.error('Import error:', error);
          }
        };
        reader.readAsText(file);
      };

      const handleClearAllData = () => {
        if (confirm('⚠️ This will DELETE ALL DATA permanently. Are you sure?')) {
          if (confirm('This cannot be undone. Export a backup first! Continue?')) {
            localStorage.removeItem('performanceReviewData');
            alert('All data cleared. Refreshing page...');
            window.location.reload();
          }
        }
      };

      return (
        <div className="max-w-2xl">
          <h2 className="text-2xl font-bold text-slate-800 mb-6">Settings</h2>

          {/* Security Warning */}
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-6 mb-6">
            <div className="flex items-start gap-3">
              <AlertCircle className="w-6 h-6 text-red-600 flex-shrink-0 mt-1" />
              <div>
                <h3 className="font-bold text-red-900 mb-2">⚠️ PROTOTYPE ONLY - NOT FOR REAL EMPLOYEE DATA</h3>
                <ul className="text-sm text-red-800 space-y-1">
                  <li>• Data stored in browser only (no encryption, no backups)</li>
                  <li>• Anyone with access to this computer can see the data</li>
                  <li>• Clearing browser cache deletes everything</li>
                  <li>• No access controls or audit logs</li>
                  <li>• <strong>Use fake names and data only for testing</strong></li>
                </ul>
                <p className="text-sm text-red-900 font-semibold mt-3">
                  For real employee data: Get IT/HR approval and upgrade to secure version (see Production Checklist)
                </p>
              </div>
            </div>
          </div>

          {/* Data Management */}
          <div className="bg-white rounded-xl p-6 border border-slate-200 mb-6">
            <h3 className="font-semibold text-slate-800 mb-4">Data Management</h3>
            
            <div className="space-y-4">
              <div className="flex items-center justify-between p-4 bg-slate-50 rounded-lg">
                <div className="flex-1">
                  <h4 className="font-medium text-slate-800">Export All Data</h4>
                  <p className="text-sm text-slate-600 mt-1">Download a backup of all employees and reviews</p>
                </div>
                <button
                  onClick={handleExportData}
                  className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2"
                >
                  <FileText className="w-4 h-4" />
                  Export JSON
                </button>
              </div>

              <div className="flex items-center justify-between p-4 bg-slate-50 rounded-lg">
                <div className="flex-1">
                  <h4 className="font-medium text-slate-800">Import Data</h4>
                  <p className="text-sm text-slate-600 mt-1">Restore from a previous backup (replaces current data)</p>
                </div>
                <label className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition-colors cursor-pointer flex items-center gap-2">
                  <FileText className="w-4 h-4" />
                  Import JSON
                  <input
                    type="file"
                    accept=".json"
                    onChange={handleImportData}
                    className="hidden"
                  />
                </label>
              </div>

              <div className="flex items-center justify-between p-4 bg-red-50 rounded-lg border border-red-200">
                <div className="flex-1">
                  <h4 className="font-medium text-red-800">Clear All Data</h4>
                  <p className="text-sm text-red-600 mt-1">Permanently delete everything (cannot be undone)</p>
                </div>
                <button
                  onClick={handleClearAllData}
                  className="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors flex items-center gap-2"
                >
                  <Trash2 className="w-4 h-4" />
                  Clear All
                </button>
              </div>
            </div>

            <div className="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
              <p className="text-xs text-blue-800">
                💡 <strong>Recommended:</strong> Export your data weekly and save to Google Drive as backup
              </p>
            </div>
          </div>

          {/* Privacy & Visibility */}
          <div className="bg-white rounded-xl p-6 border border-slate-200 mb-6">
            <h3 className="font-semibold text-slate-800 mb-4">Privacy & Visibility</h3>
            
            <div className="flex items-center justify-between p-4 bg-slate-50 rounded-lg">
              <div>
                <h4 className="font-medium text-slate-800">Show metrics to reports</h4>
                <p className="text-sm text-slate-600 mt-1">Allow employees to see their performance and growth scores</p>
              </div>
              <button onClick={() => setShowMetricsToReport(!showMetricsToReport)} className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${showMetricsToReport ? 'bg-blue-600' : 'bg-slate-300'}`}>
                <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${showMetricsToReport ? 'translate-x-6' : 'translate-x-1'}`} />
              </button>
            </div>
          </div>

          {/* About Section */}
          <div className="bg-white rounded-xl p-6 border border-slate-200">
            <h3 className="font-semibold text-slate-800 mb-4">About This Tool</h3>
            
            <div className="space-y-3 text-sm text-slate-600">
              <p>
                <strong>Version:</strong> 1.0 Prototype (Browser-only)
              </p>
              <p>
                <strong>Data Storage:</strong> Local browser only (no cloud, no sync)
              </p>
              <p>
                <strong>Suitable for:</strong> Personal testing with fake data only
              </p>
              <p>
                <strong>NOT suitable for:</strong> Real employee data, team collaboration, production use
              </p>
              <p className="pt-3 border-t border-slate-200">
                <strong>Next Steps for Production Use:</strong>
              </p>
              <ul className="list-disc pl-5 space-y-1">
                <li>Add Firebase/Supabase for cloud storage</li>
                <li>Add authentication and access controls</li>
                <li>Enable data encryption and backups</li>
                <li>Get IT/HR security approval</li>
              </ul>
              <p className="pt-3 text-blue-600 font-medium">
                📄 See "PRODUCTION_CHECKLIST.md" for full upgrade path
              </p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PerformanceReviewTool />);
  </script>
</body>
</html>
